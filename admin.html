<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리 - WoW Addon Profile Vault</title>
    <link rel="stylesheet" href="assets/styles.css">
    <script defer src="assets/admin.js"></script>
  </head>
  <body>
    <header class="site-header compact">
      <nav class="topbar" aria-label="주요 메뉴">
        <a class="brand" href="index.html">Profile Vault</a>
        <a class="nav-link" href="index.html">공유 페이지</a>
      </nav>
      <section class="hero">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>프로파일 관리</h1>
          <p>문법이 다른 애드온 문자열을 그대로 보관하고 GitHub 저장소에 JSON으로 커밋합니다.</p>
        </div>
      </section>
    </header>

    <main class="layout admin-layout">
      <section class="panel">
        <div class="section-heading">
          <h2>GitHub 연결</h2>
          <p id="connection-status">연결 전</p>
        </div>
        <form id="github-form" class="form-grid">
          <label>
            <span>Owner</span>
            <input id="owner" autocomplete="off" placeholder="GitHub 사용자명 또는 조직명" required>
          </label>
          <label>
            <span>Repository</span>
            <input id="repo" autocomplete="off" placeholder="저장소 이름" required>
          </label>
          <label>
            <span>Branch</span>
            <input id="branch" autocomplete="off" value="main" required>
          </label>
          <label>
            <span>Data path</span>
            <input id="data-path" autocomplete="off" value="data/profiles.json" required>
          </label>
          <label class="wide">
            <span>GitHub token</span>
            <input id="token" type="password" autocomplete="off" placeholder="Fine-grained PAT, 세션에만 저장">
          </label>
          <div class="actions wide">
            <button class="button" type="button" id="load-local">로컬 JSON 불러오기</button>
            <button class="button" type="submit">GitHub에서 불러오기</button>
            <button class="button primary" type="button" id="save-remote">GitHub에 저장</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="section-heading">
          <h2>사이트 정보</h2>
        </div>
        <form class="form-grid">
          <label>
            <span>제목</span>
            <input id="site-title-input">
          </label>
          <label>
            <span>부제목</span>
            <input id="site-subtitle-input">
          </label>
          <label class="wide">
            <span>Google Drive 백업 링크</span>
            <input id="download-url-input" placeholder="https://drive.google.com/...">
          </label>
        </form>
      </section>

      <section class="panel">
        <div class="section-heading">
          <h2>프로파일 추가/수정</h2>
          <button class="button" id="new-profile" type="button">새 항목</button>
        </div>
        <form id="profile-form" class="form-grid">
          <label>
            <span>ID</span>
            <input id="profile-id" placeholder="elvui-main" required>
          </label>
          <label>
            <span>애드온</span>
            <input id="profile-addon" placeholder="ElvUI" required>
          </label>
          <label>
            <span>이름</span>
            <input id="profile-name" placeholder="Main UI" required>
          </label>
          <label>
            <span>버전/메모</span>
            <input id="profile-version" placeholder="optional">
          </label>
          <label class="wide">
            <span>설명</span>
            <input id="profile-description" placeholder="어떤 용도의 프로파일인지">
          </label>
          <label class="wide">
            <span>태그</span>
            <input id="profile-tags" placeholder="ui, raid, healer">
          </label>
          <label class="wide">
            <span>프로파일 문자열</span>
            <textarea id="profile-body" rows="12" spellcheck="false" required></textarea>
          </label>
          <div class="actions wide">
            <button class="button primary" type="submit">목록에 반영</button>
            <button class="button danger" type="button" id="delete-profile">삭제</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="section-heading">
          <h2>현재 목록</h2>
          <p id="profile-count"></p>
        </div>
        <div id="admin-list" class="admin-list"></div>
      </section>
    </main>
  </body>
</html>
